spring.application.name=gamejoint-api

# Tell Spring where the MariaDB server is running (default port is usually 3306)
spring.datasource.url=jdbc:mariadb://localhost:3306/gamejoint_db
spring.datasource.username=semih
spring.datasource.password=

# Tell Hibernate to use the MariaDB dialect
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect

# VERY IMPORTANT: Keep this as 'none' or 'validate' so Spring doesn't wipe your existing PHP tables!
spring.jpa.hibernate.ddl-auto=none

# Optional: Show the SQL queries in the Eclipse console so you can see what Spring is doing
spring.jpa.show-sql=true
